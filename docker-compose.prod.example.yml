# Example production overrides for source-build installs. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.example.yml up -d --build
#
# For buildless published-image installs, use docker-compose.image.yml instead.
#
# Required environment:
#   APP_SECRET=<unique random value of at least 32 characters>
#   POSTGRES_PASSWORD=<URL-safe database password, for example openssl rand -hex 32>
#   COMPOSEBASTION_BACKUP_DIR=/srv/composebastion/backups
#
# Terminate TLS at a reverse proxy and set CORS_ORIGINS to the public origin
# if browsers access the API from a different origin.
services:
  app:
    environment:
      NODE_ENV: production
      BACKUP_DIR: /data/backups
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET to a unique random value of at least 32 characters}
      DATABASE_URL: ${DATABASE_URL:-postgres://composebastion:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/composebastion}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      ALLOW_PRIVATE_AGENT_URLS: ${ALLOW_PRIVATE_AGENT_URLS:-false}
      ALLOW_PRIVATE_WEBHOOK_URLS: ${ALLOW_PRIVATE_WEBHOOK_URLS:-false}
      BLOCK_PRIVATE_S3_ENDPOINTS: ${BLOCK_PRIVATE_S3_ENDPOINTS:-false}
      BACKUP_ENCRYPTION_KEYS: ${BACKUP_ENCRYPTION_KEYS:-}
      BACKUP_ENCRYPTION_ACTIVE_KEY_ID: ${BACKUP_ENCRYPTION_ACTIVE_KEY_ID:-app_secret}
      BACKUP_HOST_PATH_ALLOWED_ROOTS: ${BACKUP_HOST_PATH_ALLOWED_ROOTS:-}
      IMAGE_SCANNER_PROVIDER: ${IMAGE_SCANNER_PROVIDER:-auto}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-composebastion@example.com}
    volumes:
      - ${COMPOSEBASTION_BACKUP_DIR:-/srv/composebastion/backups}:/data/backups
    ports: !reset []  # terminate TLS at reverse proxy only

  worker:
    environment:
      NODE_ENV: production
      BACKUP_DIR: /data/backups
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET to a unique random value of at least 32 characters}
      DATABASE_URL: ${DATABASE_URL:-postgres://composebastion:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/composebastion}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ALLOW_PRIVATE_AGENT_URLS: ${ALLOW_PRIVATE_AGENT_URLS:-false}
      ALLOW_PRIVATE_WEBHOOK_URLS: ${ALLOW_PRIVATE_WEBHOOK_URLS:-false}
      BLOCK_PRIVATE_S3_ENDPOINTS: ${BLOCK_PRIVATE_S3_ENDPOINTS:-false}
      BACKUP_ENCRYPTION_KEYS: ${BACKUP_ENCRYPTION_KEYS:-}
      BACKUP_ENCRYPTION_ACTIVE_KEY_ID: ${BACKUP_ENCRYPTION_ACTIVE_KEY_ID:-app_secret}
      BACKUP_HOST_PATH_ALLOWED_ROOTS: ${BACKUP_HOST_PATH_ALLOWED_ROOTS:-}
      IMAGE_SCANNER_PROVIDER: ${IMAGE_SCANNER_PROVIDER:-auto}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-composebastion@example.com}
      HOST_CHECK_INTERVAL_MS: ${HOST_CHECK_INTERVAL_MS:-60000}
      INVENTORY_SYNC_INTERVAL_MS: ${INVENTORY_SYNC_INTERVAL_MS:-300000}
    volumes:
      - ${COMPOSEBASTION_BACKUP_DIR:-/srv/composebastion/backups}:/data/backups

  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
