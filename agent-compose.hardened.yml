# Optional agent hardening overlay. The agent intentionally remains root: any
# process with write access to the Docker socket is already host-root-equivalent.
services:
  composebastion-agent:
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    environment:
      HOME: /tmp/composebastion
      DOCKER_CONFIG: /tmp/composebastion/.docker
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777,size=128m
    volumes:
      - agent-data:/tmp/composebastion

volumes:
  agent-data:
