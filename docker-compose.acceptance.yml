# Local-only release acceptance stack. Every third-party fixture is pinned by
# immutable manifest digest. Runtime credentials are required and are generated
# by scripts/acceptance/run.mjs; do not add them to this file.
services:
  app:
    image: ${COMPOSEBASTION_ACCEPTANCE_IMAGE:?Set COMPOSEBASTION_ACCEPTANCE_IMAGE}
    pull_policy: never
    command: ["node", "apps/api/dist/server.js"]
    environment: &app-environment
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8080
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET}
      DATABASE_URL: postgres://composebastion:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/composebastion
      REDIS_URL: redis://redis:6379
      BACKUP_DIR: /data/backups
      WEB_DIST_DIR: /app/apps/web/dist
      SECURE_COOKIES: "false"
      TRUST_PROXY: "false"
      CORS_ORIGINS: http://127.0.0.1:${ACCEPTANCE_HTTP_PORT:-18080}
      ALLOW_PRIVATE_AGENT_URLS: "true"
      ALLOW_PRIVATE_WEBHOOK_URLS: "true"
      BLOCK_PRIVATE_S3_ENDPOINTS: "false"
      BACKUP_HOST_PATH_ALLOWED_ROOTS: /tmp/composebastion-acceptance-bind
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: acceptance@composebastion.invalid
      HOST_CHECK_INTERVAL_MS: 10000
      INVENTORY_SYNC_INTERVAL_MS: 60000
    ports:
      - "127.0.0.1:${ACCEPTANCE_HTTP_PORT:-18080}:8080"
    volumes:
      - backups:/data/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 15s

  worker:
    image: ${COMPOSEBASTION_ACCEPTANCE_IMAGE:?Set COMPOSEBASTION_ACCEPTANCE_IMAGE}
    pull_policy: never
    command: ["node", "apps/api/dist/worker.js"]
    environment:
      <<: *app-environment
    volumes:
      - backups:/data/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16.6-alpine3.20@sha256:1e59919c179e296eaf3cc701f4d50bab5c393d7ed9746c188c9d519489c998dc
    environment:
      POSTGRES_DB: composebastion
      POSTGRES_USER: composebastion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U composebastion -d composebastion"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4.1-alpine3.20@sha256:c1e88455c85225310bbea54816e9c3f4b5295815e6dbf80c34d40afc6df28275
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  mailpit:
    image: axllent/mailpit:v1.21.8@sha256:81370195cd4a0eab9604d17c2617a7525b0486f9365555253b6c5376c6350f1a
    ports:
      - "127.0.0.1:${ACCEPTANCE_MAILPIT_PORT:-18025}:8025"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z@sha256:1dce27c494a16bae114774f1cec295493f3613142713130c2d22dd5696be6ad3
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${ACCEPTANCE_MINIO_PORT:-19000}:9000"
    volumes:
      - minio-data:/data

  samba:
    image: dockurr/samba:4.21.10@sha256:fe867f409d3601a2d89b2a6a6da1e4b82dbeb6d04c7a0fcd44488d87058bfe33
    environment:
      NAME: acceptance
      USER: ${SAMBA_USER:?Set SAMBA_USER}
      PASS: ${SAMBA_PASSWORD:?Set SAMBA_PASSWORD}
    volumes:
      - samba-data:/storage

  sshhost:
    build:
      context: .
      dockerfile: infra/dev/sshhost.Dockerfile
    environment:
      COMPOSEBASTION_SSH_AUTHORIZED_KEYS: ${COMPOSEBASTION_SSH_AUTHORIZED_KEYS:?Set COMPOSEBASTION_SSH_AUTHORIZED_KEYS}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/composebastion-acceptance-bind:/tmp/composebastion-acceptance-bind

volumes:
  backups:
  postgres-data:
  redis-data:
  minio-data:
  samba-data:
