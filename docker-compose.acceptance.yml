# Local-only overrides for docker-compose.image.yml. The manager app, worker,
# database, Redis dependency semantics, ports, and backup bind mount come from
# the shipped production image Compose file; this layer only selects local
# candidate images, tightens test health intervals, and adds pinned fixtures.
# Runtime credentials are generated by scripts/acceptance/run.mjs.
services:
  app:
    image: ${COMPOSEBASTION_ACCEPTANCE_IMAGE:?Set COMPOSEBASTION_ACCEPTANCE_IMAGE}
    pull_policy: never
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 15s

  worker:
    image: ${COMPOSEBASTION_ACCEPTANCE_IMAGE:?Set COMPOSEBASTION_ACCEPTANCE_IMAGE}
    pull_policy: never

  postgres:
    image: postgres:16.6-alpine3.20@sha256:1e59919c179e296eaf3cc701f4d50bab5c393d7ed9746c188c9d519489c998dc
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U composebastion -d composebastion"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4.1-alpine3.20@sha256:c1e88455c85225310bbea54816e9c3f4b5295815e6dbf80c34d40afc6df28275
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  mailpit:
    image: axllent/mailpit:v1.21.8@sha256:81370195cd4a0eab9604d17c2617a7525b0486f9365555253b6c5376c6350f1a
    ports:
      - "127.0.0.1:${ACCEPTANCE_MAILPIT_PORT:-18025}:8025"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z@sha256:1dce27c494a16bae114774f1cec295493f3613142713130c2d22dd5696be6ad3
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${ACCEPTANCE_MINIO_PORT:-19000}:9000"
    volumes:
      - minio-data:/data

  samba:
    image: dockurr/samba:4.21.10@sha256:fe867f409d3601a2d89b2a6a6da1e4b82dbeb6d04c7a0fcd44488d87058bfe33
    environment:
      NAME: acceptance
      USER: ${SAMBA_USER:?Set SAMBA_USER}
      PASS: ${SAMBA_PASSWORD:?Set SAMBA_PASSWORD}
    volumes:
      - samba-data:/storage

  registry:
    image: registry:2.8.3@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: ComposeBastion Acceptance Registry
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    ports:
      - "127.0.0.1:${ACCEPTANCE_REGISTRY_PORT:-18050}:5000"
    volumes:
      - ${ACCEPTANCE_REGISTRY_AUTH_FILE:?Set ACCEPTANCE_REGISTRY_AUTH_FILE}:/auth/htpasswd:ro

  agent:
    image: ${COMPOSEBASTION_ACCEPTANCE_AGENT_IMAGE:?Set COMPOSEBASTION_ACCEPTANCE_AGENT_IMAGE}
    pull_policy: never
    environment:
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: 8090
      AGENT_TOKEN: ${AGENT_TOKEN:?Set AGENT_TOKEN}
    ports:
      - "127.0.0.1:${ACCEPTANCE_AGENT_PORT:-18090}:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/api/health',{headers:{authorization:'Bearer '+process.env.AGENT_TOKEN}}).then(async(r)=>process.exit(r.ok&&(await r.json()).ok===true?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

  sshhost:
    build:
      context: .
      dockerfile: infra/dev/sshhost.Dockerfile
    environment:
      COMPOSEBASTION_SSH_AUTHORIZED_KEYS: ${COMPOSEBASTION_SSH_AUTHORIZED_KEYS:?Set COMPOSEBASTION_SSH_AUTHORIZED_KEYS}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${ACCEPTANCE_BIND_DIR:?Set ACCEPTANCE_BIND_DIR}:${ACCEPTANCE_BIND_DIR:?Set ACCEPTANCE_BIND_DIR}

  composebastion-agent:
    profiles: [hardening]
    image: ${COMPOSEBASTION_ACCEPTANCE_AGENT_IMAGE:?Set COMPOSEBASTION_ACCEPTANCE_AGENT_IMAGE}
    pull_policy: never
    environment:
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: 8090
      AGENT_TOKEN: ${AGENT_TOKEN:?Set AGENT_TOKEN}
    ports:
      - "127.0.0.1:${ACCEPTANCE_HARDENED_AGENT_PORT:-18590}:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/api/health',{headers:{authorization:'Bearer '+process.env.AGENT_TOKEN}}).then(async(r)=>process.exit(r.ok&&(await r.json()).ok===true?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

volumes:
  minio-data:
  samba-data:
