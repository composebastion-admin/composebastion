version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Africa/Johannesburg"
    open-pull-requests-limit: 5
    labels:
      - "type: dependencies"
      - "area: security"
    groups:
      npm-routine:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - ">=25"
      - dependency-name: "@xterm/addon-fit"
        versions:
          - ">=0.11"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Africa/Johannesburg"
    open-pull-requests-limit: 5
    labels:
      - "type: dependencies"
      - "area: ci"
    groups:
      github-actions-routine:
        update-types:
          - "minor"
          - "patch"
      docker-actions-majors:
        patterns:
          - "docker/*"
        update-types:
          - "major"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Africa/Johannesburg"
    open-pull-requests-limit: 5
    labels:
      - "type: dependencies"
      - "area: docker"

  - package-ecosystem: "docker"
    directory: "/infra/dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Africa/Johannesburg"
    open-pull-requests-limit: 3
    labels:
      - "type: dependencies"
      - "area: docker"
      - "area: ci"
