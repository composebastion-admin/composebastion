name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, tests & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Migration naming
        run: npm run lint:migrations
      - name: OpenAPI docs
        run: npm run openapi:check
      - name: Release metadata alignment
        run: npm run check:release-version
      - name: Public repository hygiene
        run: npm run check:public-hygiene
      - name: Go module attribution bundle
        run: npm run check:go-attribution
      - name: Go attribution release policy
        run: npm run test:go-attribution-policy
      - name: Third-party notices
        run: npm run notices:check
      - name: Immutable workflow actions
        run: npm run check:actions-pinned
      - name: Release workflow invariants
        run: npm run check:release-workflows
      - name: Unit tests
        run: npm test
      - name: Enforce workspace coverage baselines
        run: npm run coverage
      - name: Audit all dependencies
        run: npm audit --audit-level=high

  integration:
    name: Postgres integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.6-alpine3.20@sha256:1e59919c179e296eaf3cc701f4d50bab5c393d7ed9746c188c9d519489c998dc
        env:
          POSTGRES_DB: composebastion
          POSTGRES_USER: composebastion
          POSTGRES_PASSWORD: composebastion
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U composebastion -d composebastion"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4.1-alpine3.20@sha256:c1e88455c85225310bbea54816e9c3f4b5295815e6dbf80c34d40afc6df28275
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      COMPOSEBASTION_INTEGRATION: "1"
      DATABASE_URL: postgres://composebastion:composebastion@localhost:5432/composebastion
      REDIS_URL: redis://localhost:6379
      APP_SECRET: ci-test-secret-which-is-at-least-32-chars-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build --workspace @composebastion/shared
      # The API integration tests share one database, so the test files must run
      # serially (each resets its tables in beforeAll); parallel files collide.
      - name: Run API integration tests
        run: npm run test --workspace @composebastion/api -- --no-file-parallelism

  browser-smoke:
    name: Browser smoke & accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run web smoke tests
        run: npm run smoke:web

  production-build:
    name: Production image smoke
    runs-on: ubuntu-latest
    env:
      APP_SECRET: ci-test-secret-which-is-at-least-32-chars-long
      POSTGRES_PASSWORD: composebastion-ci-password
      COMPOSEBASTION_BACKUP_DIR: /tmp/composebastion-backups
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - name: Materialize exact Git build context
        run: node scripts/materialize-git-context.mjs "${RUNNER_TEMP}/composebastion-git-context" "${GITHUB_SHA}"
      - name: Validate production compose config
        run: docker compose -f docker-compose.yml -f docker-compose.prod.example.yml config
      - name: Validate Compose environment contracts
        run: npm run check:compose-env
      - name: Validate existing PostgreSQL volume upgrades
        run: npm run check:postgres-upgrade
      - name: Validate local acceptance Compose stack
        run: npm run acceptance:config
      - name: Validate Docker build context exclusions
        run: npm run check:docker-context
      - name: Build app runtime image
        run: docker build --target runtime -t composebastion-app:ci "${RUNNER_TEMP}/composebastion-git-context"
      - name: Build agent runtime image
        run: docker build -f "${RUNNER_TEMP}/composebastion-git-context/Dockerfile.agent" --target runtime -t composebastion-agent:ci "${RUNNER_TEMP}/composebastion-git-context"

  ssh-integration:
    name: Ephemeral SSH Docker host integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Start SSH Docker host fixture
        run: |
          set -euo pipefail
          key_dir="${RUNNER_TEMP}/composebastion-ssh"
          key_path="${key_dir}/id_ed25519"
          mkdir -p "${key_dir}"
          ssh-keygen -t ed25519 -N "" -f "${key_path}" -C "composebastion-ci" >/dev/null

          source_context="${RUNNER_TEMP}/composebastion-git-context"
          node scripts/materialize-git-context.mjs "${source_context}" "${GITHUB_SHA}"
          docker build -f "${source_context}/infra/dev/sshhost.Dockerfile" -t composebastion-dev-sshhost "${source_context}"
          docker rm -f composebastion-ci-sshhost >/dev/null 2>&1 || true
          docker run -d \
            --name composebastion-ci-sshhost \
            -p 127.0.0.1:2222:22 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e "COMPOSEBASTION_SSH_AUTHORIZED_KEYS=$(cat "${key_path}.pub")" \
            composebastion-dev-sshhost

          for attempt in {1..30}; do
            if ssh -i "${key_path}" \
              -p 2222 \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=2 \
              root@127.0.0.1 true; then
              break
            fi
            if [ "${attempt}" = "30" ]; then
              docker logs composebastion-ci-sshhost
              exit 1
            fi
            sleep 1
          done

          {
            echo "COMPOSEBASTION_SSH_TEST_HOST=127.0.0.1"
            echo "COMPOSEBASTION_SSH_TEST_PORT=2222"
            echo "COMPOSEBASTION_SSH_TEST_USER=root"
            echo "COMPOSEBASTION_SSH_TEST_KEY<<EOF"
            cat "${key_path}"
            echo "EOF"
          } >> "${GITHUB_ENV}"
      - name: Run SSH integration test
        run: npm run test --workspace @composebastion/api -- ssh.integration.test.ts
      - name: Stop SSH Docker host fixture
        if: always()
        run: docker rm -f composebastion-ci-sshhost >/dev/null 2>&1 || true

  external-ssh-integration:
    name: External SSH integration (optional secrets)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && vars.COMPOSEBASTION_RUN_EXTERNAL_SSH_TESTS == 'true' }}
    env:
      COMPOSEBASTION_SSH_TEST_HOST: ${{ secrets.COMPOSEBASTION_SSH_TEST_HOST }}
      COMPOSEBASTION_SSH_TEST_PORT: ${{ secrets.COMPOSEBASTION_SSH_TEST_PORT }}
      COMPOSEBASTION_SSH_TEST_USER: ${{ secrets.COMPOSEBASTION_SSH_TEST_USER }}
      COMPOSEBASTION_SSH_TEST_KEY: ${{ secrets.COMPOSEBASTION_SSH_TEST_KEY }}
      COMPOSEBASTION_SSH_TEST_KEY_PASSPHRASE: ${{ secrets.COMPOSEBASTION_SSH_TEST_KEY_PASSPHRASE }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Validate SSH secrets
        run: |
          set -euo pipefail
          missing=0
          for name in COMPOSEBASTION_SSH_TEST_HOST COMPOSEBASTION_SSH_TEST_USER COMPOSEBASTION_SSH_TEST_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub secret ${name}"
              missing=1
            fi
          done
          exit "${missing}"
      - name: Run external SSH integration test
        run: npm run test --workspace @composebastion/api -- ssh.integration.test.ts

  live-acceptance:
    name: Live release acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run full local-stack acceptance including public upgrade
        run: npm run acceptance:local
      - name: Assert release-qualifying acceptance report
        if: always()
        run: npm run acceptance:assert-report

  ci-gate:
    name: CI quality gate
    if: always()
    needs: [quality, integration, browser-smoke, production-build, ssh-integration, live-acceptance]
    runs-on: ubuntu-latest
    steps:
      - name: Require all release CI jobs
        env:
          QUALITY: ${{ needs.quality.result }}
          INTEGRATION: ${{ needs.integration.result }}
          BROWSER: ${{ needs.browser-smoke.result }}
          BUILD: ${{ needs.production-build.result }}
          SSH: ${{ needs.ssh-integration.result }}
          ACCEPTANCE: ${{ needs.live-acceptance.result }}
        run: |
          test "${QUALITY}" = success
          test "${INTEGRATION}" = success
          test "${BROWSER}" = success
          test "${BUILD}" = success
          test "${SSH}" = success
          test "${ACCEPTANCE}" = success
