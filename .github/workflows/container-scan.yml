name: Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "42 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  image-scan:
    name: Scan ${{ matrix.component }} ${{ matrix.arch }} runtime image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: app
            dockerfile: Dockerfile
            arch: amd64
            platform: linux/amd64
          - component: app
            dockerfile: Dockerfile
            arch: arm64
            platform: linux/arm64
          - component: agent
            dockerfile: Dockerfile.agent
            arch: amd64
            platform: linux/amd64
          - component: agent
            dockerfile: Dockerfile.agent
            arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Materialize exact Git build context
        run: node scripts/materialize-git-context.mjs /tmp/composebastion-git-context "${GITHUB_SHA}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build runtime image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: /tmp/composebastion-git-context
          file: /tmp/composebastion-git-context/${{ matrix.dockerfile }}
          target: runtime
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: composebastion-${{ matrix.component }}:ci-${{ matrix.arch }}
          cache-from: type=gha,scope=scan-${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=scan-${{ matrix.component }}-${{ matrix.arch }}

      - name: Scan runtime image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: composebastion-${{ matrix.component }}:ci-${{ matrix.arch }}
          version: "v0.72.0"
          trivyignores: ".trivyignore.yaml"
          format: "table"
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

  container-scan-gate:
    name: Container scan gate
    if: always()
    needs: image-scan
    runs-on: ubuntu-latest
    steps:
      - name: Require every image scan
        env:
          IMAGE_SCAN_RESULT: ${{ needs.image-scan.result }}
        run: test "${IMAGE_SCAN_RESULT}" = success
