name: Container Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "42 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  image-scan:
    name: Scan ${{ matrix.component }} ${{ matrix.arch }} runtime image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: app
            dockerfile: Dockerfile
            arch: amd64
            platform: linux/amd64
          - component: app
            dockerfile: Dockerfile
            arch: arm64
            platform: linux/arm64
          - component: agent
            dockerfile: Dockerfile.agent
            arch: amd64
            platform: linux/amd64
          - component: agent
            dockerfile: Dockerfile.agent
            arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Materialize exact Git build context
        run: node scripts/materialize-git-context.mjs /tmp/composebastion-git-context "${GITHUB_SHA}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build runtime image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: /tmp/composebastion-git-context
          file: /tmp/composebastion-git-context/${{ matrix.dockerfile }}
          target: runtime
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: composebastion-${{ matrix.component }}:ci-${{ matrix.arch }}
          cache-from: type=gha,scope=scan-${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=scan-${{ matrix.component }}-${{ matrix.arch }}

      - name: Scan runtime image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: composebastion-${{ matrix.component }}:ci-${{ matrix.arch }}
          version: "v0.72.0"
          trivyignores: ".trivyignore.yaml"
          format: "table"
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

  container-scan-gate:
    name: Container scan gate
    if: always()
    needs: image-scan
    runs-on: ubuntu-latest
    steps:
      - name: Require every image scan
        env:
          IMAGE_SCAN_RESULT: ${{ needs.image-scan.result }}
        run: test "${IMAGE_SCAN_RESULT}" = success
