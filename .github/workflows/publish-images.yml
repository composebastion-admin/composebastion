name: Publish Images

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "Dockerfile"
      - "Dockerfile.agent"
      - "docker-compose*.yml"
      - "agent-compose*.yml"
      - "package.json"
      - "package-lock.json"
      - "LICENSE.md"
      - "LICENSING_SUMMARY.md"
      - "COMMERCIAL-LICENSE.md"
      - "NOTICE.md"
      - "THIRD-PARTY-NOTICES.md"
      - "TRADEMARKS.md"
      - "LICENSES/**"
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - ".github/workflows/publish-images.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Dockerfile.agent"
      - "docker-compose*.yml"
      - "agent-compose*.yml"
      - "package.json"
      - "package-lock.json"
      - "LICENSE.md"
      - "LICENSING_SUMMARY.md"
      - "COMMERCIAL-LICENSE.md"
      - "NOTICE.md"
      - "THIRD-PARTY-NOTICES.md"
      - "TRADEMARKS.md"
      - "LICENSES/**"
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - ".github/workflows/publish-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: ${{ github.repository_owner }}/composebastion-app
  AGENT_IMAGE_NAME: ${{ github.repository_owner }}/composebastion-agent

jobs:
  validate-release:
    name: Release metadata gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "${tag_version}" != "${package_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            exit 1
          fi
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Release tag commit is not reachable from origin/main."
            exit 1
          fi

  scan-release-images:
    name: Scan ${{ matrix.component }} ${{ matrix.arch }} release image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: app
            dockerfile: Dockerfile
            arch: amd64
            platform: linux/amd64
          - component: app
            dockerfile: Dockerfile
            arch: arm64
            platform: linux/arm64
          - component: agent
            dockerfile: Dockerfile.agent
            arch: amd64
            platform: linux/amd64
          - component: agent
            dockerfile: Dockerfile.agent
            arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build scan image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: runtime
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          tags: composebastion-${{ matrix.component }}:release-scan-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ matrix.arch }}

      - name: Scan release image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: composebastion-${{ matrix.component }}:release-scan-${{ matrix.arch }}
          version: "v0.72.0"
          ignore-policy: ".github/trivy-ignore.rego"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

  release-image-gate:
    name: Release image security gate
    needs: scan-release-images
    runs-on: ubuntu-latest
    steps:
      - run: echo "All app and agent release image variants passed vulnerability scanning."

  publish:
    name: Build and publish multi-arch images
    needs: [validate-release, release-image-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read package version
        id: package
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "created=${created}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: App image metadata
        id: app_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=ComposeBastion
            org.opencontainers.image.vendor=ComposeBastion Admin
            org.opencontainers.image.licenses=LicenseRef-ComposeBastion-SourceAvailable-PrivateUse-1.0
            org.opencontainers.image.version=${{ steps.package.outputs.version }}

      - name: Agent image metadata
        id: agent_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=ComposeBastion Agent
            org.opencontainers.image.vendor=ComposeBastion Admin
            org.opencontainers.image.licenses=LicenseRef-ComposeBastion-SourceAvailable-PrivateUse-1.0
            org.opencontainers.image.version=${{ steps.package.outputs.version }}

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.app_meta.outputs.tags }}
          labels: ${{ steps.app_meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.package.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.package.outputs.created }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.agent_meta.outputs.tags }}
          labels: ${{ steps.agent_meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.package.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.package.outputs.created }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent

      - name: Publish app image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.app_meta.outputs.tags }}
          labels: ${{ steps.app_meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.package.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.package.outputs.created }}
          cache-from: type=gha,scope=app

      - name: Publish agent image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.agent_meta.outputs.tags }}
          labels: ${{ steps.agent_meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.package.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.package.outputs.created }}
          cache-from: type=gha,scope=agent
