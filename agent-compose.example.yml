# Source-build host-agent example. For buildless installs on NAS/Proxmox/native
# Docker hosts, use agent-compose.image.example.yml instead.
services:
  composebastion-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      AGENT_TOKEN: ${AGENT_TOKEN:?Set AGENT_TOKEN to a strong random token of at least 24 characters}
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: 8090
      AGENT_READ_RATE_LIMIT: "${AGENT_READ_RATE_LIMIT:-120}"
      AGENT_RUN_RATE_LIMIT: "${AGENT_RUN_RATE_LIMIT:-30}"
      AGENT_FILE_RATE_LIMIT: "${AGENT_FILE_RATE_LIMIT:-60}"
      AGENT_STREAM_RATE_LIMIT: "${AGENT_STREAM_RATE_LIMIT:-10}"
    ports:
      - name: agent
        target: 8090
        published: "${COMPOSEBASTION_AGENT_PORT:-8090}"
        host_ip: ${COMPOSEBASTION_AGENT_BIND_ADDRESS:?Set COMPOSEBASTION_AGENT_BIND_ADDRESS to a trusted manager-reachable address}
        protocol: tcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/api/health',{headers:{authorization:'Bearer '+process.env.AGENT_TOKEN}}).then(async(r)=>process.exit(r.ok&&(await r.json()).ok===true?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
